services:
  db:
    image: postgres:17-alpine
    container_name: rrs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rrs
      POSTGRES_USER: rrs
      POSTGRES_PASSWORD: rrs
    ports:
      - "5434:5432"
    volumes:
      - rrs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rrs -d rrs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rrs_postgres_data:
